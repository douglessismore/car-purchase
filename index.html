<script type="text/babel" data-presets="react">
const { useState, useMemo, useRef, useEffect } = React;
const {
  LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer,
  ReferenceLine, AreaChart, Area,
} = Recharts;

// ─────────────────────────────────────────────────────────────────────────────
// FINANCIAL ENGINE
// ─────────────────────────────────────────────────────────────────────────────

function monthlyLoanPayment(price, downPayment, aprPercent, months) {
  const principal = Math.max(0, price - downPayment);
  if (principal === 0 || months <= 0) return 0;
  const r = aprPercent / 100 / 12;
  if (r === 0) return principal / months;
  return (principal * r) / (1 - Math.pow(1 + r, -months));
}

function fuelMonthly(v, monthlyMiles, gasPrice, electricityRate) {
  if (v.type === 'EV') return (monthlyMiles / v.milesPerKwh) * electricityRate;
  return (monthlyMiles / v.mpg) * gasPrice;
}

function effectiveDown(v, globalDown) {
  if (v.fixedDownPayment !== undefined) return v.fixedDownPayment;
  return Math.min(globalDown, v.price);
}

function computeMonthly(v, g) {
  const down = effectiveDown(v, g.downPayment);
  const loanPmt = monthlyLoanPayment(v.price, down, v.apr, v.loanMonths);
  const fees = v.feesPerMonth || 0;
  const payment = loanPmt + fees;
  const fuel = fuelMonthly(v, g.monthlyMiles, g.gasPrice, g.electricityRate);
  return {
    payment, loanPmt, fees, fuel,
    insurance: v.insurance, maintenance: v.maintenance,
    total: payment + fuel + v.insurance + v.maintenance,
    downPayment: down,
  };
}

function remainingLoanCommitment(v, g, atMonth) {
  const m = computeMonthly(v, g);
  if (atMonth >= v.loanMonths) return 0;
  return (v.loanMonths - atMonth) * m.payment;
}

function totalAtMonth(v, g, atMonth) {
  const m = computeMonthly(v, g);
  const paymentMonths = Math.min(atMonth, v.loanMonths);
  return m.downPayment + paymentMonths * m.payment + atMonth * (m.fuel + m.insurance + m.maintenance);
}

function trueCostAtMonth(v, g, atMonth) {
  return totalAtMonth(v, g, atMonth) + remainingLoanCommitment(v, g, atMonth);
}

function cumulativeSeries(v, g, horizonMonths = 60) {
  const m = computeMonthly(v, g);
  const out = [];
  let cum = m.downPayment;
  out.push({ month: 0, total: cum });
  for (let i = 1; i <= horizonMonths; i++) {
    const monthPayment = i <= v.loanMonths ? m.payment : 0;
    cum += monthPayment + m.fuel + m.insurance + m.maintenance;
    out.push({ month: i, total: cum });
  }
  return out;
}

// ─────────────────────────────────────────────────────────────────────────────
// FORMATTING
// ─────────────────────────────────────────────────────────────────────────────

const fmtUSD = (n, d = 0) => new Intl.NumberFormat('en-US', {
  style: 'currency', currency: 'USD',
  maximumFractionDigits: d, minimumFractionDigits: d,
}).format(Math.round(n * Math.pow(10, d)) / Math.pow(10, d));

const fmtUSDcompact = (n) => {
  if (Math.abs(n) >= 1000) return '$' + (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
  return fmtUSD(n);
};

const ACCENT = {
  emerald: { text: 'text-emerald-700', bg: 'bg-emerald-50', ring: 'ring-emerald-200', dot: 'bg-emerald-600', stroke: '#047857', soft: 'bg-emerald-50/60' },
  sky:     { text: 'text-sky-700',     bg: 'bg-sky-50',     ring: 'ring-sky-200',     dot: 'bg-sky-600',     stroke: '#0369a1', soft: 'bg-sky-50/60' },
  amber:   { text: 'text-amber-700',   bg: 'bg-amber-50',   ring: 'ring-amber-200',   dot: 'bg-amber-600',   stroke: '#b45309', soft: 'bg-amber-50/60' },
  stone:   { text: 'text-stone-700',   bg: 'bg-stone-100',  ring: 'ring-stone-300',   dot: 'bg-stone-600',   stroke: '#57534e', soft: 'bg-stone-50' },
};

// ─────────────────────────────────────────────────────────────────────────────
// PRIMITIVES
// ─────────────────────────────────────────────────────────────────────────────

function Section({ id, children, className = '' }) {
  return (
    <section id={id} className={`max-w-6xl mx-auto px-5 sm:px-10 ${className}`}>
      {children}
    </section>
  );
}

function Slider({ label, value, onChange, min, max, step, format, hint }) {
  return (
    <label className="block">
      <div className="flex items-baseline justify-between mb-2">
        <span className="text-sm text-stone-700">{label}</span>
        <span className="mono text-sm text-ink number-tabular">{format ? format(value) : value}</span>
      </div>
      <input type="range" min={min} max={max} step={step} value={value}
             onChange={(e) => onChange(parseFloat(e.target.value))} className="w-full" />
      {hint && <div className="text-xs text-stone-500 mt-1.5">{hint}</div>}
    </label>
  );
}

function InlineNum({ value, onChange, prefix = '$' }) {
  return (
    <span className="inline-flex items-baseline">
      <span className="text-stone-400 text-xs mr-0.5">{prefix}</span>
      <input
        type="number"
        value={value}
        onChange={(e) => onChange(parseFloat(e.target.value) || 0)}
        className="inline-num"
      />
    </span>
  );
}

function Toggle({ on, onChange }) {
  return (
    <button onClick={() => onChange(!on)}
            className={`relative w-10 h-6 rounded-full transition-colors ${on ? 'bg-emerald-600' : 'bg-stone-300'}`}

      <span className={`absolute top-0.5 left-0.5 w-5 h-5 rounded-full bg-white shadow transition-transform ${on ? 'translate-x-4' : ''}`} />
    </button>
  );
}

          {summary && <p className="text-sm text-stone-500 mt-1 max-w-2xl">{summary}</p>}
        </div>
        <div className="shrink-0 flex items-center gap-2 text-stone-400 text-xs">
          <span className="hidden sm:inline group-open:hidden">Open</span>
          <span className="hidden sm:inline group-not-open:hidden hidden">Close</span>
          <span className="mono group-open:rotate-180 transition-transform inline-block text-base text-stone-500">▾</span>
        </div>
      </summary>
      <div className="px-5 sm:px-8 pb-6 sm:pb-8 pt-2 border-t border-stone-100">
        {children}
      </div>
    </details>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// HEADER & HERO

function Header() {

}

    <Section className="pt-10 sm:pt-14 pb-6">
      <div className="mono text-xs tracking-[0.2em] uppercase text-stone-500 mb-3">
        High-mileage household · {globals.annualMiles.toLocaleString()} mi a year
      </div>
      <h1 className="display text-3xl sm:text-5xl font-medium text-ink leading-[1.05] max-w-3xl">

// ─────────────────────────────────────────────────────────────────────────────
// COMPARISON TABLE — the centerpiece
// ─────────────────────────────────────────────────────────────────────────────

function ComparisonTable({ vehicles, globals, setVehicles, winnerId, monthlyWinnerId }) {
  const updateVehicle = (id, patch) => {
    setVehicles((vs) => vs.map((v) => v.id === id ? { ...v, ...patch } : v));
  };

  return (
    <Section className="pb-8 sm:pb-10">
      <div className="rounded-2xl bg-white ring-soft overflow-hidden">
        <div className="px-5 sm:px-8 pt-6 sm:pt-8 pb-2">
          <h2 className="display text-2xl sm:text-3xl font-medium text-ink">The comparison</h2>
          <p className="text-sm text-stone-500 mt-1">
            Monthly cost is payment + fuel/electricity + insurance + maintenance.
            Five-year total includes the down payment and any loan balance still owed at year five.
          </p>
        </div>

        <div className="sm:hidden px-5 pt-2 pb-1 flex items-center gap-2 text-xs text-stone-500 bg-stone-50/40 border-t border-stone-100">
          <span aria-hidden>←</span>
          <span>Swipe across the table to see all columns</span>
          <span aria-hidden>→</span>
        </div>
        <div className="overflow-x-auto">
          <table className="w-full">
            <thead>
              <tr className="text-left text-stone-500">
                <th className="px-4 sm:px-8 py-3 mono text-[10px] tracking-[0.15em] uppercase font-medium">Vehicle</th>
                <th className="px-2 py-3 mono text-[10px] tracking-[0.15em] uppercase font-medium">Sticker</th>
                <th className="px-2 py-3 mono text-[10px] tracking-[0.15em] uppercase font-medium">Payment</th>
                <th className="px-2 py-3 mono text-[10px] tracking-[0.15em] uppercase font-medium">Fuel</th>
                <th className="px-2 py-3 mono text-[10px] tracking-[0.15em] uppercase font-medium">Insurance</th>
                <th className="px-2 py-3 mono text-[10px] tracking-[0.15em] uppercase font-medium">Maint.</th>
                <th className="px-2 py-3 text-right mono text-[10px] tracking-[0.15em] uppercase font-medium">Monthly</th>
                <th className="px-4 sm:px-8 py-3 text-right mono text-[10px] tracking-[0.15em] uppercase font-medium">5-year</th>
              </tr>
            </thead>
            <tbody>
              {vehicles.map((v) => {
                const m = computeMonthly(v, globals);
                const fiveYear = trueCostAtMonth(v, globals, 60);
                const isWinner = v.id === winnerId;
                const isMonthlyMin = v.id === monthlyWinnerId;
                const a = ACCENT[v.accent];
                return (
                  <tr key={v.id} className={`border-t border-stone-100 align-middle ${isWinner ? a.soft : ''}`}>
                    <td className="px-4 sm:px-8 py-4">
                      <div className="flex items-center gap-2">
                        <span className={`w-1.5 h-1.5 rounded-full ${a.dot}`} />
                        <span className="font-medium text-ink text-sm sm:text-base">{v.name}</span>
                      </div>
                      <div className="text-xs text-stone-500 mt-0.5">{v.tagline}</div>
                    </td>
                    <td className="px-2 py-4 whitespace-nowrap">
                      <InlineNum value={v.price} onChange={(val) => updateVehicle(v.id, { price: val })} />
                    </td>
                    <td className="px-2 py-4 mono text-sm number-tabular text-stone-700 whitespace-nowrap">
                      {fmtUSD(m.payment)}
                    </td>
                    <td className="px-2 py-4 mono text-sm number-tabular text-stone-700 whitespace-nowrap">
                      {fmtUSD(m.fuel)}
                      <div className="text-[10px] text-stone-400 mt-0.5">
                        {v.type === 'EV' ? `${v.milesPerKwh} mi/kWh` : `${v.mpg} mpg`}
                      </div>
                    </td>
                    <td className="px-2 py-4 whitespace-nowrap">
                      <InlineNum value={v.insurance} onChange={(val) => updateVehicle(v.id, { insurance: val })} />
                    </td>
                    <td className="px-2 py-4 whitespace-nowrap">
                      <InlineNum value={v.maintenance} onChange={(val) => updateVehicle(v.id, { maintenance: val })} />
                    </td>
                    <td className="px-2 py-4 text-right whitespace-nowrap">
                      <span className={`display text-xl sm:text-2xl font-medium number-tabular ${isMonthlyMin ? a.text : 'text-ink'}`}>
                        {fmtUSD(m.total)}
                      </span>
                      <div className="text-[10px] text-stone-400 mt-0.5">/ month</div>
                    </td>
                    <td className="px-4 sm:px-8 py-4 text-right whitespace-nowrap">
                      <span className={`display text-xl sm:text-2xl font-medium number-tabular ${isWinner ? a.text : 'text-ink'}`}>
                        {fmtUSDcompact(fiveYear)}
                      </span>
                      <div className="text-[10px] text-stone-400 mt-0.5">over 5 years</div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>

        <Verdict vehicles={vehicles} globals={globals} winnerId={winnerId} monthlyWinnerId={monthlyWinnerId} />
      </div>
      <p className="text-xs text-stone-500 mt-4 px-1">
        The dotted numbers (insurance, maintenance) are editable — click and type your real quotes.
        Five-year totals include the down payment up front, sixty months of operating costs, and the loan balance still owed at year five (relevant for the Used Tesla's 72-month term).
      </p>
    </Section>
  );
}

function Verdict({ vehicles, globals, winnerId, monthlyWinnerId }) {
  const winner = vehicles.find((v) => v.id === winnerId);
  const monthlyWinner = vehicles.find((v) => v.id === monthlyWinnerId);
  const sub = vehicles.find((v) => v.id === 'subaru-used');
  const teslaNew = vehicles.find((v) => v.id === 'tesla-new-regular');
  const subFive = sub ? trueCostAtMonth(sub, globals, 60) : 0;
  const tesFive = teslaNew ? trueCostAtMonth(teslaNew, globals, 60) : 0;
  const delta = subFive - tesFive;

  return (
    <div className="px-5 sm:px-8 py-5 border-t border-stone-100 bg-stone-50/50">
      <div className="grid sm:grid-cols-3 gap-5 text-sm">
        <div>
          <div className="mono text-[10px] tracking-[0.18em] uppercase text-stone-500 mb-1">Lowest five-year</div>
          <div className="text-ink"><span className="font-medium">{winner.short}</span> at {fmtUSDcompact(trueCostAtMonth(winner, globals, 60))}</div>
        </div>
        <div>
          <div className="mono text-[10px] tracking-[0.18em] uppercase text-stone-500 mb-1">Lowest monthly</div>
          <div className="text-ink"><span className="font-medium">{monthlyWinner.short}</span> at {fmtUSD(computeMonthly(monthlyWinner, globals).total)}/mo</div>
        </div>
        <div>
          <div className="mono text-[10px] tracking-[0.18em] uppercase text-stone-500 mb-1">EV vs. Subaru, 5 years</div>
          <div className="text-ink">
            {delta > 0
              ? <>Model Y saves <span className="font-medium">{fmtUSDcompact(delta)}</span></>
              : <>Subaru saves <span className="font-medium">{fmtUSDcompact(-delta)}</span></>}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// CHART
// ─────────────────────────────────────────────────────────────────────────────

function CumulativeChart({ vehicles, globals }) {
  const data = useMemo(() => {
    const series = vehicles.map((v) => ({ v, s: cumulativeSeries(v, globals, 60) }));
    const rows = [];
    for (let i = 0; i <= 60; i++) {
      const row = { month: i };
      series.forEach(({ v, s }) => { row[v.id] = Math.round(s[i].total); });
      rows.push(row);
    }
    return rows;
  }, [vehicles, globals]);

  return (
    <Section className="pb-8 sm:pb-10">
      <div className="rounded-2xl bg-white ring-soft p-5 sm:p-7">
        <div className="flex items-baseline justify-between flex-wrap gap-2 mb-2">
          <div>
            <h3 className="display text-xl sm:text-2xl font-medium">Total cash out over five years</h3>
            <p className="text-xs sm:text-sm text-stone-500 mt-1">Every dollar spent on the car, including the down payment. Lower line wins. Watch where lines cross.</p>
          </div>
          <div className="flex flex-wrap gap-x-4 gap-y-1 text-xs">
            {vehicles.map((v) => (
              <div key={v.id} className="flex items-center gap-1.5">
                <span className="w-3 h-0.5 rounded-full" style={{ background: ACCENT[v.accent].stroke }} />
                <span className="text-stone-600">{v.short}</span>
              </div>
            ))}
          </div>
        </div>
        <div className="h-64 sm:h-80 mt-4">
          <ResponsiveContainer>
            <LineChart data={data} margin={{ top: 10, right: 16, left: 0, bottom: 0 }}>
              <CartesianGrid stroke="#E7E2D6" strokeDasharray="2 4" vertical={false} />
              <XAxis dataKey="month" tick={{ fill: '#78716c', fontSize: 11 }} tickLine={false}
                     axisLine={{ stroke: '#E7E2D6' }} ticks={[0, 12, 24, 36, 48, 60]}
                     tickFormatter={(m) => m === 0 ? 'today' : `yr ${m/12}`} />
              <YAxis tick={{ fill: '#78716c', fontSize: 11 }} tickLine={false}
                     axisLine={{ stroke: '#E7E2D6' }} tickFormatter={(v) => fmtUSDcompact(v)} width={50} />
              <Tooltip contentStyle={{ background: '#FBF8F3', border: '1px solid #E7E2D6', borderRadius: 8, fontSize: 12 }}
                       labelFormatter={(m) => m === 0 ? 'Down payment day' : `Month ${m}`}
                       formatter={(v, name) => {
                         const veh = vehicles.find((x) => x.id === name);
                         return [fmtUSD(v), veh ? veh.short : name];
                       }} />
              {vehicles.map((v) => (
                <Line key={v.id} type="monotone" dataKey={v.id}
                      stroke={ACCENT[v.accent].stroke} strokeWidth={2} dot={false} activeDot={{ r: 4 }} />
              ))}
            </LineChart>
          </ResponsiveContainer>
        </div>
      </div>
    </Section>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// INPUTS PANEL — shared inputs only
// ─────────────────────────────────────────────────────────────────────────────

function InputsPanel({ globals, setGlobals }) {
  return (
    <Section className="pb-8 sm:pb-10">
      <div className="rounded-2xl bg-white ring-soft p-5 sm:p-7">
        <div className="flex items-baseline justify-between mb-5 flex-wrap gap-2">
          <div>
            <h3 className="display text-xl sm:text-2xl font-medium">Adjust the inputs</h3>
            <p className="text-xs sm:text-sm text-stone-500 mt-1">All four rows recompute as you drag. Insurance & maintenance are inline in the table above.</p>
          </div>
          <button onClick={() => setGlobals(DEFAULT_GLOBALS)}
                  className="text-xs text-stone-500 hover:text-ink transition">Reset to defaults</button>
        </div>
        <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-6 sm:gap-8">
          <Slider label="Annual miles"
                  value={globals.annualMiles}
                  onChange={(v) => setGlobals({...globals, annualMiles: v, monthlyMiles: Math.round(v/12)})}
                  min={8000} max={50000} step={1000}
                  format={(v) => v.toLocaleString() + ' mi'} />
          <Slider label="Gas price"
                  value={globals.gasPrice} onChange={(v) => setGlobals({...globals, gasPrice: v})}
                  min={2.5} max={6} step={0.05} format={(v) => '$' + v.toFixed(2) + '/gal'} />
          <Slider label="Electricity"
                  value={globals.electricityRate} onChange={(v) => setGlobals({...globals, electricityRate: v})}
                  min={0.08} max={0.35} step={0.01} format={(v) => '$' + v.toFixed(2) + '/kWh'} />
          <Slider label="Down payment (Teslas)"
                  value={globals.downPayment} onChange={(v) => setGlobals({...globals, downPayment: v})}
                  min={0} max={30000} step={500} format={(v) => fmtUSD(v)}
                  hint="Subaru is modeled with $0 down" />
        </div>
      </div>
    </Section>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// TURO COMPARISON (collapsible)
// ─────────────────────────────────────────────────────────────────────────────

function TuroBlock({ vehicles, globals }) {
  const [daysPerMonth, setDaysPerMonth] = useState(12);
  const [reservePerDay, setReservePerDay] = useState(25);

  const rows = vehicles.map((v) => {
    const m = computeMonthly(v, globals);
    const gross = (v.turoDaily || 0) * daysPerMonth;
    const reserve = daysPerMonth * reservePerDay;
    const net = Math.max(0, gross - reserve);
    const annualNet = net * 12;
    const annualLoan = m.payment * Math.min(12, v.loanMonths);
    const coverage = annualLoan > 0 ? (annualNet / annualLoan) * 100 : null;
    const monthlyAfter = m.total - net;
    return { v, m, gross, reserve, net, annualNet, annualLoan, coverage, monthlyAfter };
  });
  const minAfter = Math.min(...rows.map((r) => r.monthlyAfter));

  return (
    <div>
      <div className="grid sm:grid-cols-2 gap-5 sm:gap-7 mb-6">
        <Slider label="Rental days per month" value={daysPerMonth} onChange={setDaysPerMonth}
                min={0} max={24} step={1} format={(v) => v + ' days'}
                hint="12 days ≈ half-time. Turo's quoted earnings assume ~12 days/mo." />
        <Slider label="Reserve per rental day" value={reservePerDay} onChange={setReservePerDay}
                min={0} max={75} step={5} format={(v) => '$' + v + '/day'}
                hint="Cleaning, charging, claim buffer. $20–30/day is realistic." />
      </div>

      <div className="rounded-xl ring-soft overflow-hidden">
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead className="text-stone-500">
              <tr className="text-left">
                <th className="px-3 sm:px-5 py-3 mono text-[10px] tracking-[0.15em] uppercase font-medium">Vehicle</th>
                <th className="px-2 py-3 mono text-[10px] tracking-[0.15em] uppercase font-medium">Daily</th>
                <th className="px-2 py-3 mono text-[10px] tracking-[0.15em] uppercase font-medium">Net /mo</th>
                <th className="px-2 py-3 mono text-[10px] tracking-[0.15em] uppercase font-medium">Annual loan</th>
                <th className="px-2 py-3 mono text-[10px] tracking-[0.15em] uppercase font-medium">Loan covered</th>
                <th className="px-3 sm:px-5 py-3 text-right mono text-[10px] tracking-[0.15em] uppercase font-medium">Net monthly</th>
              </tr>
            </thead>
            <tbody>
              {rows.map((r) => {
                const a = ACCENT[r.v.accent];
                const isMin = r.monthlyAfter === minAfter;
                return (
                  <tr key={r.v.id} className={`border-t border-stone-100 ${isMin ? a.soft : ''}`}>
                    <td className="px-3 sm:px-5 py-3">
                      <div className="flex items-center gap-2">
                        <span className={`w-1.5 h-1.5 rounded-full ${a.dot}`} />
                        <span className="text-ink">{r.v.short}</span>
                      </div>
                    </td>
                    <td className="px-2 py-3 mono number-tabular text-stone-700">{fmtUSD(r.v.turoDaily || 0)}</td>
                    <td className="px-2 py-3 mono number-tabular text-emerald-700">{fmtUSD(r.net)}</td>
                    <td className="px-2 py-3 mono number-tabular text-stone-700">{fmtUSD(r.annualLoan)}</td>
                    <td className="px-2 py-3 mono number-tabular text-stone-700">{r.coverage !== null ? r.coverage.toFixed(0) + '%' : '—'}</td>
                    <td className={`px-3 sm:px-5 py-3 mono number-tabular text-right ${isMin ? a.text + ' font-medium' : 'text-ink'}`}>
                      {fmtUSD(r.monthlyAfter)}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      <p className="text-xs text-stone-500 mt-4 leading-relaxed">
        <span className="text-ink font-medium">Loan covered</span> = Turo earnings ÷ annual loan payments.
        Above 100% means Turo income more than pays the loan. The Subaru rates very well here because
        its loan cost is low — but the Tesla still wins on net monthly because of fuel savings.
        Daily rates come from Turo's calculator and are editable per-vehicle in the inputs.
      </p>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// USED TESLA WARRANTY RUNWAY (collapsible)
// ─────────────────────────────────────────────────────────────────────────────

function WarrantyBlock({ vehicles, globals }) {
  const used = vehicles.find((v) => v.id === 'tesla-used');
  if (!used) return null;
  const yearsRemaining = (used.batteryWarrantyMiles - used.startingMiles) / globals.annualMiles;
  const data = [];
  for (let m = 0; m <= 96; m++) {
    const miles = used.startingMiles + (globals.annualMiles / 12) * m;
    data.push({ month: m, miles: Math.round(miles) });
  }
  return (
    <div>
      <p className="text-sm text-stone-700 leading-relaxed max-w-2xl">
        Tesla's battery & drivetrain warranty is eight years or 100,000 miles, whichever comes first.
        A 2023 Used Y typically has ~40,000 miles already on it, leaving about 60,000 miles of cover.
        At {globals.annualMiles.toLocaleString()} miles a year, you cross 100k in about
        <span className="text-ink font-medium"> {yearsRemaining.toFixed(1)} years</span>.
        After that, a high-voltage battery replacement runs $10–20k out of pocket.
      </p>
      <div className="h-52 sm:h-64 mt-5">
        <ResponsiveContainer>
          <AreaChart data={data}>
            <CartesianGrid stroke="#FCE7B7" strokeDasharray="2 4" vertical={false} />
            <XAxis dataKey="month"
                   tickFormatter={(m) => m === 0 ? 'now' : `yr ${(m/12).toFixed(0)}`}
                   ticks={[0,12,24,36,48,60,72,84,96]}
                   tick={{ fill: '#92400e', fontSize: 11 }} tickLine={false} axisLine={{ stroke: '#FCE7B7' }} />
            <YAxis tick={{ fill: '#92400e', fontSize: 11 }} tickLine={false} axisLine={{ stroke: '#FCE7B7' }}
                   tickFormatter={(v) => (v/1000) + 'k mi'} width={56} />
            <Tooltip contentStyle={{ background: '#FFFBF0', border: '1px solid #FCE7B7', borderRadius: 8, fontSize: 12 }}
                     formatter={(v) => v.toLocaleString() + ' mi'}
                     labelFormatter={(m) => `Year ${(m/12).toFixed(1)}`} />
            <ReferenceLine y={used.batteryWarrantyMiles} stroke="#b45309" strokeDasharray="3 3"
                           label={{ value: '100k warranty cap', position: 'right', fill: '#b45309', fontSize: 11 }} />
            <Area type="monotone" dataKey="miles" stroke="#b45309" fill="#fde68a" strokeWidth={2} />
          </AreaChart>
        </ResponsiveContainer>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// SUMMARY NOTE (collapsible, copy/print)
// ─────────────────────────────────────────────────────────────────────────────

function SummaryBlock({ vehicles, globals, winnerId }) {
  const [copied, setCopied] = useState(false);
  const winner = vehicles.find((v) => v.id === winnerId);
  const sub = vehicles.find((v) => v.id === 'subaru-used');

  const text = useMemo(() => {
    if (!winner) return '';
    const wm = computeMonthly(winner, globals);
    const sm = sub ? computeMonthly(sub, globals) : null;
    const lines = [];
    lines.push('Vehicle decision · the numbers');
    lines.push('');
    lines.push(`Annual driving: ${globals.annualMiles.toLocaleString()} miles. Gas: ${fmtUSD(globals.gasPrice, 2)}/gal. Electricity: ${fmtUSD(globals.electricityRate, 2)}/kWh.`);
    lines.push('');
    lines.push('Monthly cost (payment + fuel + insurance + maintenance):');
    vehicles.forEach((v) => {
      const m = computeMonthly(v, globals);
      lines.push(`  • ${v.name}: ${fmtUSD(m.total)}/mo`);
    });
    lines.push('');
    lines.push('Five-year total (down payment + 60 months of operating + any loan balance owed):');
    vehicles.forEach((v) => {
      const t = trueCostAtMonth(v, globals, 60);
      lines.push(`  • ${v.name}: ${fmtUSD(t)}`);
    });
    lines.push('');
    lines.push(`Lowest five-year total: ${winner.name}.`);
    lines.push('');
    if (winner.type === 'EV' && sm) {
      const delta = sm.fuel - wm.fuel;
      lines.push(`Fuel detail: at ${globals.annualMiles.toLocaleString()} mi/yr, gasoline costs ~${fmtUSD(sm.fuel)}/mo vs. ~${fmtUSD(wm.fuel)}/mo on electricity. Difference: ${fmtUSD(delta)}/mo (${fmtUSD(delta * 12)}/yr).`);
      lines.push('');
    }
    lines.push('Not included above: Turo income, federal EV tax credit (up to $7,500), sales tax, dealer fees, resale value, depreciation. Turo is modeled separately in the page.');
    lines.push('');
    lines.push('Items to verify before signing:');
    lines.push('  • Real insurance quotes per vehicle');
    lines.push('  • Home charging access and electricity rate');
    lines.push('  • Test drive — comfort matters at 3 hours/day');
    return lines.join('\n');
  }, [vehicles, globals, winnerId, winner, sub]);

  const copy = async () => {
    try {
      await navigator.clipboard.writeText(text);
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    } catch (e) {}
  };

  return (
    <div>
      <div className="flex items-center justify-end gap-2 mb-4 no-print">
        <button onClick={copy} className="px-3 py-1.5 rounded-lg text-xs font-medium bg-ink text-paper hover:bg-stone-800 transition">
          {copied ? '✓ Copied' : 'Copy text'}
        </button>
        <button onClick={() => window.print()} className="px-3 py-1.5 rounded-lg text-xs font-medium ring-1 ring-stone-300 text-stone-700 hover:bg-stone-50 transition">
          Print
        </button>
      </div>
      <pre className="whitespace-pre-wrap text-[15px] leading-[1.7] text-stone-800" style={{ fontFamily: 'Fraunces, Georgia, serif' }}>
{text}
      </pre>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// NOTES & SOURCES (collapsible)
// ─────────────────────────────────────────────────────────────────────────────

function NotesBlock() {
  return (
    <div className="text-sm text-stone-600 leading-relaxed space-y-4">
      <div>
        <div className="mono text-[10px] tracking-[0.18em] uppercase text-stone-500 mb-1.5">What the math includes</div>
        Down payment, loan payments (with interest for non-0% loans), monthly fuel or electricity,
        insurance, maintenance, and any loan balance still owed at the five-year mark.
      </div>
      <div>
        <div className="mono text-[10px] tracking-[0.18em] uppercase text-stone-500 mb-1.5">What it doesn't include</div>
        Sales tax, registration, dealer fees, home charger install, federal EV tax credit
        (potentially $7,500), depreciation curves, resale value at year 5, and the real-world
        variance in insurance quotes. Turo income is modeled separately and not folded into the
        main table.
      </div>
      <div>
        <div className="mono text-[10px] tracking-[0.18em] uppercase text-stone-500 mb-1.5">Where the defaults come from</div>
        Tesla pricing and APR from public Tesla offers. Mileage efficiency from typical Model Y
        real-world figures. Gas and electricity from US national averages. Maintenance estimates
        from common ownership cost guides. Turo daily rates from Turo's host calculator for each
        vehicle. Every input above is adjustable.
      </div>
      <div>
        <div className="mono text-[10px] tracking-[0.18em] uppercase text-stone-500 mb-1.5">Battery warranty</div>
        Tesla's high-voltage battery & drive unit warranty: 8 years or 100,000 miles, whichever
        comes first. Minimum 70% retention guaranteed within those limits.
      </div>
      <div className="text-xs text-stone-400 pt-2">
        This is a personal decision tool, not financial advice. No affiliation with Tesla, Subaru,
        Turo, or any lender.
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// APP
// ─────────────────────────────────────────────────────────────────────────────

function App() {
  const [globals, setGlobals] = useState(DEFAULT_GLOBALS);
  const [vehicles, setVehicles] = useState(DEFAULT_VEHICLES);

  const winnerId = useMemo(() => {
    let best = vehicles[0], bestVal = trueCostAtMonth(best, globals, 60);
    vehicles.forEach((v) => {
      const t = trueCostAtMonth(v, globals, 60);
      if (t < bestVal) { best = v; bestVal = t; }
    });
    return best.id;
  }, [vehicles, globals]);

  const monthlyWinnerId = useMemo(() => {
    let best = vehicles[0], bestVal = computeMonthly(best, globals).total;
    vehicles.forEach((v) => {
      const m = computeMonthly(v, globals).total;
      if (m < bestVal) { best = v; bestVal = m; }
    });
    return best.id;
  }, [vehicles, globals]);

  const winner = vehicles.find((v) => v.id === winnerId);

  return (
    <div className="min-h-screen pb-20">
      <Header />
      <Hero winner={winner} globals={globals} />
      <ComparisonTable vehicles={vehicles} globals={globals} setVehicles={setVehicles}
                       winnerId={winnerId} monthlyWinnerId={monthlyWinnerId} />
      <CumulativeChart vehicles={vehicles} globals={globals} />
      <InputsPanel globals={globals} setGlobals={setGlobals} />

      <Section className="space-y-4">
        <Collapsible eyebrow="Optional side income" title="Turo, applied to each vehicle"
                     summary="Renting the car part-time when you're out of town or when one car covers both adults. Daily rates from Turo's calculator.">
          <TuroBlock vehicles={vehicles} globals={globals} />
        </Collapsible>

        <Collapsible eyebrow="Used Tesla risk" title="Battery warranty runway"
                     summary="Why $10k of sticker discount on the used Y might not be $10k of value.">
          <WarrantyBlock vehicles={vehicles} globals={globals} />
        </Collapsible>

        <Collapsible eyebrow="Plain version" title="One-page summary"
                     summary="Printable, copy-pasteable. No persuasion — the numbers, the assumptions, and what to verify.">
          <SummaryBlock vehicles={vehicles} globals={globals} winnerId={winnerId} />
        </Collapsible>

        <Collapsible eyebrow="Methodology" title="What this includes (and doesn't)"
                     summary="Where the defaults come from and what the model leaves out.">
          <NotesBlock />
        </Collapsible>
      </Section>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
