// ─────────────────────────────────────────────────────────────────────────────
// FINANCIAL ENGINE
// ─────────────────────────────────────────────────────────────────────────────

function monthlyLoanPayment(price, downPayment, aprPercent, months) {
  const principal = Math.max(0, price - downPayment);
  if (principal === 0 || months <= 0) return 0;
  const r = aprPercent / 100 / 12;
  if (r === 0) return principal / months;
  return (principal * r) / (1 - Math.pow(1 + r, -months));
}

function fuelMonthly(v, monthlyMiles, gasPrice, electricityRate) {
  if (v.type === 'EV') return (monthlyMiles / v.milesPerKwh) * electricityRate;
  return (monthlyMiles / v.mpg) * gasPrice;
}

function effectiveDown(v, globalDown) {
  if (v.fixedDownPayment !== undefined) return v.fixedDownPayment;
  return Math.min(globalDown, v.price);
}

function computeMonthly(v, g) {
  const down = effectiveDown(v, g.downPayment);
  const loanPmt = monthlyLoanPayment(v.price, down, v.apr, v.loanMonths);
  const fees = v.feesPerMonth || 0;
  const payment = loanPmt + fees;
  const fuel = fuelMonthly(v, g.monthlyMiles, g.gasPrice, g.electricityRate);
  return {
    payment, loanPmt, fees, fuel,
    insurance: v.insurance, maintenance: v.maintenance,
    total: payment + fuel + v.insurance + v.maintenance,
    downPayment: down,
  };
}

function remainingLoanCommitment(v, g, atMonth) {
  const m = computeMonthly(v, g);
  if (atMonth >= v.loanMonths) return 0;
  return (v.loanMonths - atMonth) * m.payment;
}

function totalAtMonth(v, g, atMonth) {
  const m = computeMonthly(v, g);
  const paymentMonths = Math.min(atMonth, v.loanMonths);
  return m.downPayment + paymentMonths * m.payment + atMonth * (m.fuel + m.insurance + m.maintenance);
}

function trueCostAtMonth(v, g, atMonth) {
  return totalAtMonth(v, g, atMonth) + remainingLoanCommitment(v, g, atMonth);
}

function cumulativeSeries(v, g, horizonMonths = 60) {
  const m = computeMonthly(v, g);
  const out = [];
  let cum = m.downPayment;
  out.push({ month: 0, total: cum });
  for (let i = 1; i <= horizonMonths; i++) {
    const monthPayment = i <= v.loanMonths ? m.payment : 0;
    cum += monthPayment + m.fuel + m.insurance + m.maintenance;
    out.push({ month: i, total: cum });
  }
  return out;
}

const fmtUSD = (n, d = 0) => new Intl.NumberFormat('en-US', {
  style: 'currency', currency: 'USD',
  maximumFractionDigits: d, minimumFractionDigits: d,
}).format(Math.round(n * Math.pow(10, d)) / Math.pow(10, d));

const fmtUSDcompact = (n) => {
  if (Math.abs(n) >= 1000) return '$' + (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
  return fmtUSD(n);
};

  amber:   { text: 'text-amber-700',   bg: 'bg-amber-50',   ring: 'ring-amber-200',   dot: 'bg-amber-600',   stroke: '#b45309', soft: 'bg-amber-50/60' },

                <th className="px-2 py-3 mono text-[10px] tracking-[0.15em] uppercase font-medium">Fuel</th>
                <th className="px-2 py-3 mono text-[10px] tracking-[0.15em] uppercase font-medium">Insurance</th>
                <th className="px-2 py-3 mono text-[10px] tracking-[0.15em] uppercase font-medium">Maint.</th>
                <th className="px-2 py-3 text-right mono text-[10px] tracking-[0.15em] uppercase font-medium">Monthly</th>
                <th className="px-4 sm:px-8 py-3 text-right mono text-[10px] tracking-[0.15em] uppercase font-medium">5-year</th>
              </tr>
            </thead>
            <tbody>

                      <div className="text-xs text-stone-500 mt-0.5">{v.tagline}</div>
                    </td>
                    <td className="px-2 py-4 whitespace-nowrap">
                      <InlineNum value={v.price} onChange={(val) => updateVehicle(v.id, { price: val })} />
                    </td>
                    <td className="px-2 py-4 whitespace-nowrap">
                      <div className="mono text-sm number-tabular text-stone-700">{fmtUSD(m.payment)}</div>
                      <div className="text-[10px] text-stone-400 mt-0.5 flex items-baseline gap-0.5">

function Verdict({ vehicles, globals, winnerId, monthlyWinnerId }) {
  const winner = vehicles.find((v) => v.id === winnerId);
  const monthlyWinner = vehicles.find((v) => v.id === monthlyWinnerId);
  const sub = vehicles.find((v) => v.id === 'subaru-used');
  const teslaNew = vehicles.find((v) => v.id === 'tesla-new-regular');
  const subFive = sub ? trueCostAtMonth(sub, globals, 60) : 0;
  const tesFive = teslaNew ? trueCostAtMonth(teslaNew, globals, 60) : 0;
  const delta = subFive - tesFive;

  return (
    <div className="px-5 sm:px-8 py-5 border-t border-stone-100 bg-stone-50/50">
      <div className="grid sm:grid-cols-3 gap-5 text-sm">
        <div>
          <div className="mono text-[10px] tracking-[0.18em] uppercase text-stone-500 mb-1">Lowest five-year</div>
          <div className="text-ink"><span className="font-medium">{winner.short}</span> at {fmtUSDcompact(trueCostAtMonth(winner, globals, 60))}</div>
        </div>
        <div>
          <div className="mono text-[10px] tracking-[0.18em] uppercase text-stone-500 mb-1">Lowest monthly</div>
          <div className="text-ink"><span className="font-medium">{monthlyWinner.short}</span> at {fmtUSD(computeMonthly(monthlyWinner, globals).total)}/mo</div>
        </div>
        <div>
          <div className="mono text-[10px] tracking-[0.18em] uppercase text-stone-500 mb-1">EV vs. Subaru, 5 years</div>
          <div className="text-ink">
            {delta > 0
              ? <>Model Y saves <span className="font-medium">{fmtUSDcompact(delta)}</span></>
              : <>Subaru saves <span className="font-medium">{fmtUSDcompact(-delta)}</span></>}
          </div>
        </div>
      </div>
    </div>
  );
}

function CumulativeChart({ vehicles, globals }) {
  const data = useMemo(() => {
    const series = vehicles.map((v) => ({ v, s: cumulativeSeries(v, globals, 60) }));
    const rows = [];
    for (let i = 0; i <= 60; i++) {
      const row = { month: i };
      series.forEach(({ v, s }) => { row[v.id] = Math.round(s[i].total); });
      rows.push(row);
    }
    return rows;
  }, [vehicles, globals]);

  return (
    <Section className="pb-8 sm:pb-10">
      <div className="rounded-2xl bg-white ring-soft p-5 sm:p-7">
        <div className="flex items-baseline justify-between flex-wrap gap-2 mb-2">

            <h3 className="display text-xl sm:text-2xl font-medium">Total cash out over five years</h3>
            <p className="text-xs sm:text-sm text-stone-500 mt-1">Every dollar spent on the car, including the down payment. Lower line wins. Watch where lines cross.</p>
          </div>
          <div className="flex flex-wrap gap-x-4 gap-y-1 text-xs">
            {vehicles.map((v) => (

// ─────────────────────────────────────────────────────────────────────────────
// TURO COMPARISON (collapsible)
// ─────────────────────────────────────────────────────────────────────────────

function TuroBlock({ vehicles, globals }) {
  const [daysPerMonth, setDaysPerMonth] = useState(12);
  const [reservePerDay, setReservePerDay] = useState(25);

  const rows = vehicles.map((v) => {
    const m = computeMonthly(v, globals);
    const gross = (v.turoDaily || 0) * daysPerMonth;
    const reserve = daysPerMonth * reservePerDay;
    const net = Math.max(0, gross - reserve);
    const annualNet = net * 12;
    const annualLoan = m.payment * Math.min(12, v.loanMonths);
    const coverage = annualLoan > 0 ? (annualNet / annualLoan) * 100 : null;
    const monthlyAfter = m.total - net;
    return { v, m, gross, reserve, net, annualNet, annualLoan, coverage, monthlyAfter };
  });
  const minAfter = Math.min(...rows.map((r) => r.monthlyAfter));

  return (
    <div>
      <div className="grid sm:grid-cols-2 gap-5 sm:gap-7 mb-6">
        <Slider label="Rental days per month" value={daysPerMonth} onChange={setDaysPerMonth}
                min={0} max={24} step={1} format={(v) => v + ' days'}
                hint="12 days ≈ half-time. Turo's quoted earnings assume ~12 days/mo." />
        <Slider label="Reserve per rental day" value={reservePerDay} onChange={setReservePerDay}
                min={0} max={75} step={5} format={(v) => '$' + v + '/day'}
                hint="Cleaning, charging, claim buffer. $20–30/day is realistic." />
      </div>

      <div className="rounded-xl ring-soft overflow-hidden">
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead className="text-stone-500">
              <tr className="text-left">
                <th className="px-3 sm:px-5 py-3 mono text-[10px] tracking-[0.15em] uppercase font-medium">Vehicle</th>
                <th className="px-2 py-3 mono text-[10px] tracking-[0.15em] uppercase font-medium">Daily</th>
                <th className="px-2 py-3 mono text-[10px] tracking-[0.15em] uppercase font-medium">Net /mo</th>
                <th className="px-2 py-3 mono text-[10px] tracking-[0.15em] uppercase font-medium">Annual loan</th>
                <th className="px-2 py-3 mono text-[10px] tracking-[0.15em] uppercase font-medium">Loan covered</th>
                <th className="px-3 sm:px-5 py-3 text-right mono text-[10px] tracking-[0.15em] uppercase font-medium">Net monthly</th>
              </tr>
            </thead>
            <tbody>
              {rows.map((r) => {
                const a = ACCENT[r.v.accent];
                const isMin = r.monthlyAfter === minAfter;
                return (
                  <tr key={r.v.id} className={`border-t border-stone-100 ${isMin ? a.soft : ''}`}>
                    <td className="px-3 sm:px-5 py-3">
                      <div className="flex items-center gap-2">
                        <span className={`w-1.5 h-1.5 rounded-full ${a.dot}`} />
                        <span className="text-ink">{r.v.short}</span>
                      </div>
                    </td>
                    <td className="px-2 py-3 mono number-tabular text-stone-700">{fmtUSD(r.v.turoDaily || 0)}</td>
                    <td className="px-2 py-3 mono number-tabular text-emerald-700">{fmtUSD(r.net)}</td>
                    <td className="px-2 py-3 mono number-tabular text-stone-700">{fmtUSD(r.annualLoan)}</td>
                    <td className="px-2 py-3 mono number-tabular text-stone-700">{r.coverage !== null ? r.coverage.toFixed(0) + '%' : '—'}</td>
                    <td className={`px-3 sm:px-5 py-3 mono number-tabular text-right ${isMin ? a.text + ' font-medium' : 'text-ink'}`}>
                      {fmtUSD(r.monthlyAfter)}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      <p className="text-xs text-stone-500 mt-4 leading-relaxed">
        <span className="text-ink font-medium">Loan covered</span> = Turo earnings ÷ annual loan payments.
        Above 100% means Turo income more than pays the loan. The Subaru rates very well here because
        its loan cost is low — but the Tesla still wins on net monthly because of fuel savings.
        Daily rates come from Turo's calculator and are editable per-vehicle in the inputs.
      </p>
    </div>
  );
}

function SummaryBlock({ vehicles, globals, winnerId }) {
  const [copied, setCopied] = useState(false);
  const winner = vehicles.find((v) => v.id === winnerId);
  const sub = vehicles.find((v) => v.id === 'subaru-used');

  const text = useMemo(() => {
    if (!winner) return '';
    const wm = computeMonthly(winner, globals);
    const sm = sub ? computeMonthly(sub, globals) : null;
    const lines = [];
    lines.push('Vehicle decision · the numbers');
    lines.push('');
    lines.push(`Annual driving: ${globals.annualMiles.toLocaleString()} miles. Gas: ${fmtUSD(globals.gasPrice, 2)}/gal. Electricity: ${fmtUSD(globals.electricityRate, 2)}/kWh.`);
    lines.push('');
    lines.push('Monthly cost (payment + fuel + insurance + maintenance):');
    vehicles.forEach((v) => {
      const m = computeMonthly(v, globals);
      lines.push(`  • ${v.name}: ${fmtUSD(m.total)}/mo`);
    });
    lines.push('');
    lines.push('Five-year total (down payment + 60 months of operating + any loan balance owed):');
    vehicles.forEach((v) => {
      const t = trueCostAtMonth(v, globals, 60);
      lines.push(`  • ${v.name}: ${fmtUSD(t)}`);
    });
    lines.push('');
    lines.push(`Lowest five-year total: ${winner.name}.`);
    lines.push('');
    if (winner.type === 'EV' && sm) {
      const delta = sm.fuel - wm.fuel;
      lines.push(`Fuel detail: at ${globals.annualMiles.toLocaleString()} mi/yr, gasoline costs ~${fmtUSD(sm.fuel)}/mo vs. ~${fmtUSD(wm.fuel)}/mo on electricity. Difference: ${fmtUSD(delta)}/mo (${fmtUSD(delta * 12)}/yr).`);
      lines.push('');
    }
    lines.push('Not included above: Turo income, federal EV tax credit (up to $7,500), sales tax, dealer fees, resale value, depreciation. Turo is modeled separately in the page.');
    lines.push('');
    lines.push('Items to verify before signing:');
    lines.push('  • Real insurance quotes per vehicle');
    lines.push('  • Home charging access and electricity rate');
    lines.push('  • Test drive — comfort matters at 3 hours/day');
    return lines.join('\n');
  }, [vehicles, globals, winnerId, winner, sub]);

  const copy = async () => {
    try {
      await navigator.clipboard.writeText(text);
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    } catch (e) {}
  };

  return (
    <div>
      <div className="flex items-center justify-end gap-2 mb-4 no-print">
        <button onClick={copy} className="px-3 py-1.5 rounded-lg text-xs font-medium bg-ink text-paper hover:bg-stone-800 transition">
          {copied ? '✓ Copied' : 'Copy text'}
        </button>
        <button onClick={() => window.print()} className="px-3 py-1.5 rounded-lg text-xs font-medium ring-1 ring-stone-300 text-stone-700 hover:bg-stone-50 transition">
          Print
        </button>
      </div>
      <pre className="whitespace-pre-wrap text-[15px] leading-[1.7] text-stone-800" style={{ fontFamily: 'Fraunces, Georgia, serif' }}>
{text}
      </pre>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// ID BUZZ ADJUSTED ECONOMICS (collapsible, live calc)
// ─────────────────────────────────────────────────────────────────────────────

function BuzzAdjustedEconomics({ vehicles, globals }) {
  const buzz = vehicles.find((v) => v.id === 'vw-id-buzz');
  const teslaY = vehicles.find((v) => v.id === 'tesla-new-regular');
  if (!buzz) return null;

  const [taxRate, setTaxRate] = useState(32);
  const [businessUsePct, setBusinessUsePct] = useState(75);
  const [wrapCost, setWrapCost] = useState(5000);
  const [structure, setStructure] = useState('purchase');

  const baseFiveYr = trueCostAtMonth(buzz, globals, 60);
  const businessBasis = buzz.price * (businessUsePct / 100);

  // ID Buzz: Section 179 only applies on purchase. Lease path = $7,500 federal commercial EV credit.
  const buzzSec179Cap = 30500;
  const buzzSec179 = structure === 'purchase' ? Math.min(buzzSec179Cap, businessBasis) : 0;
  const buzzSec179Savings = buzzSec179 * (taxRate / 100);
  const buzzWrapSavings = wrapCost * (taxRate / 100);
  const buzzEvCredit = structure === 'lease' ? 7500 : 0;
  const buzzAdjusted = baseFiveYr - buzzSec179Savings - buzzWrapSavings - buzzEvCredit;

  // Tesla Y comparison: federal EV credit on purchase (Austin-built) + smaller Section 179 (light vehicle cap)
  const teslaBase = teslaY ? trueCostAtMonth(teslaY, globals, 60) : 0;
  const teslaSec179Cap = 12200;
  const teslaSec179 = teslaY ? Math.min(teslaSec179Cap, teslaY.price * (businessUsePct / 100)) : 0;
  const teslaSec179Savings = teslaSec179 * (taxRate / 100);
  const teslaAdjusted = teslaY ? teslaBase - 7500 - teslaSec179Savings : 0;
  const gap = buzzAdjusted - teslaAdjusted;

  return (
    <div className="space-y-6">
      <p className="text-sm text-stone-600 leading-relaxed">
        The main table shows the ID Buzz at <span className="font-medium text-ink">{fmtUSDcompact(baseFiveYr)}</span> over
        five years — pure cash out, before business tax benefits. (The {fmtUSDcompact(72000 - buzz.price)} dealer discount
        off the $72k MSRP <em>is</em> already in.) Below is the same number adjusted for the deductions and credits
        Sol Solace could legitimately claim.
      </p>

      <div className="rounded-xl ring-soft p-5 bg-stone-50/40 space-y-5 sm:space-y-6">
        <div>
          <div className="text-sm text-stone-700 mb-2">Structure</div>
          <div className="inline-flex rounded-lg ring-1 ring-stone-300 bg-white overflow-hidden">
            <button onClick={() => setStructure('purchase')}
              className={`px-4 py-1.5 text-sm transition ${structure === 'purchase' ? 'bg-ink text-paper' : 'text-stone-700 hover:bg-stone-50'}`}>
              Purchase
            </button>
            <button onClick={() => setStructure('lease')}
              className={`px-4 py-1.5 text-sm transition ${structure === 'lease' ? 'bg-ink text-paper' : 'text-stone-700 hover:bg-stone-50'}`}>
              Lease
            </button>
          </div>
          <div className="text-xs text-stone-500 mt-2">
            {structure === 'purchase'
              ? 'Section 179 heavy-SUV deduction applies (up to $30,500).'
              : 'Federal $7,500 EV credit passes through as cap-cost reduction. No Section 179 on a lease.'}
          </div>
        </div>
        <div className="grid sm:grid-cols-3 gap-5 sm:gap-6">
          <Slider label="Business use" value={businessUsePct} onChange={setBusinessUsePct}
                  min={0} max={100} step={5} format={(v) => v + '%'}
                  hint=">50% required for Section 179." />
          <Slider label="Effective tax rate" value={taxRate} onChange={setTaxRate}
                  min={15} max={45} step={1} format={(v) => v + '%'}
                  hint="Combined federal + state, marginal." />
          <Slider label="Wrap cost" value={wrapCost} onChange={setWrapCost}
                  min={2000} max={8000} step={250} format={(v) => fmtUSD(v)}
                  hint="Deductible as advertising expense." />
        </div>
      </div>

      <div className="rounded-xl ring-soft overflow-hidden">
        <table className="w-full text-sm">
          <tbody>
            <tr className="border-b border-stone-100">
              <td className="px-4 sm:px-6 py-3 text-stone-700">Five-year cost from table</td>
              <td className="px-4 sm:px-6 py-3 mono number-tabular text-right text-ink">{fmtUSD(baseFiveYr)}</td>
            </tr>
            {structure === 'purchase' && buzzSec179Savings > 0 && (
              <tr className="border-b border-stone-100">
                <td className="px-4 sm:px-6 py-3 text-stone-600">
                  <div>− Section 179 tax savings</div>
                  <div className="text-xs text-stone-400 mt-0.5">{fmtUSD(buzzSec179)} deductible × {taxRate}%</div>
                </td>
                <td className="px-4 sm:px-6 py-3 mono number-tabular text-right text-emerald-700">−{fmtUSD(buzzSec179Savings)}</td>
              </tr>
            )}
            {structure === 'lease' && (
              <tr className="border-b border-stone-100">
                <td className="px-4 sm:px-6 py-3 text-stone-600">
                  <div>− Federal commercial EV credit</div>
                  <div className="text-xs text-stone-400 mt-0.5">Lease structure, passed through in cap-cost reduction</div>
                </td>
                <td className="px-4 sm:px-6 py-3 mono number-tabular text-right text-emerald-700">−$7,500</td>
              </tr>
            )}
            <tr className="border-b border-stone-100">
              <td className="px-4 sm:px-6 py-3 text-stone-600">
                <div>− Wrap deduction savings</div>
                <div className="text-xs text-stone-400 mt-0.5">{fmtUSD(wrapCost)} × {taxRate}%</div>
              </td>
              <td className="px-4 sm:px-6 py-3 mono number-tabular text-right text-emerald-700">−{fmtUSD(buzzWrapSavings)}</td>
            </tr>
            <tr className="bg-rose-50/40">
              <td className="px-4 sm:px-6 py-4 text-ink font-medium">Adjusted ID Buzz · five-year cost</td>
              <td className="px-4 sm:px-6 py-4 mono number-tabular text-right">
                <span className="display text-xl sm:text-2xl text-rose-700">{fmtUSD(buzzAdjusted)}</span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      {teslaY && (
        <div className="rounded-xl bg-emerald-50/40 ring-1 ring-emerald-100 p-5">
          <div className="mono text-[10px] tracking-[0.18em] uppercase text-emerald-700 mb-2">Apples-to-apples context</div>
          <p className="text-sm text-stone-700 leading-relaxed">
            Tesla Model Y also qualifies for the $7,500 federal credit (Austin-built) and a smaller
            Section 179 deduction (capped at ~$12,200 since it's a light vehicle).
            Its comparable adjusted five-year cost is <span className="font-medium text-ink">{fmtUSD(teslaAdjusted)}</span>.
          </p>
          <p className="text-sm text-stone-700 leading-relaxed mt-2">
            <span className="text-ink font-medium">The remaining gap is about {fmtUSDcompact(gap)} over five years.</span>{' '}
            That's what you'd be paying for the wrap presence, the vehicle's character, and the
            mobile-brand asset Sol Solace would gain. A real number, not a hidden one — worth
            knowing what it is so you can decide if it's worth it.
          </p>
        </div>
      )}

      <p className="text-xs text-stone-500 leading-relaxed">
        Estimates assume Sol Solace has enough business income in year one to absorb the Section 179
        deduction. Bonus depreciation (~40% in 2025–2026, subject to legislation) on the remainder
        could add several thousand more in tax savings — not modeled. Confirm with your accountant
        before relying on these numbers.
      </p>
    </div>
  );
}

function MobileTrailerAnalysis() {

  const monthlySavings = currentOfficeRent - monthlyOperating;

// DEALER OFFER TRACKER (collapsible, localStorage)

function DealerTracker() {
  const [offers, setOffers] = useState(() => {
    try {
      const saved = localStorage.getItem('dealerOffers');
      return saved ? JSON.parse(saved) : [];
    } catch { return []; }
  });

  useEffect(() => {
    try { localStorage.setItem('dealerOffers', JSON.stringify(offers)); } catch {}
  }, [offers]);

  const addOffer = () => {
    setOffers([...offers, {
      id: Date.now(),
      dealer: '', city: '', stock: '', otd: '',
      daysOnLot: '', nextStep: '', notes: '',
    }]);
  };

  const updateOffer = (id, patch) => {
    setOffers((os) => os.map((o) => o.id === id ? { ...o, ...patch } : o));
  };

  const deleteOffer = (id) => {
    setOffers((os) => os.filter((o) => o.id !== id));
  };

  const bestOtd = useMemo(() => {
    const valid = offers.map((o) => parseFloat(o.otd)).filter((n) => n > 0);
    return valid.length ? Math.min(...valid) : null;
  }, [offers]);

  const bestOffer = bestOtd !== null ? offers.find((o) => parseFloat(o.otd) === bestOtd) : null;

  const cellInput = "block w-full bg-transparent border-b border-dotted border-stone-200 hover:border-stone-400 focus:border-ink focus:outline-none";

  return (
    <div>
      {bestOffer && (
        <div className="mb-5 px-4 py-3 rounded-xl bg-emerald-50 ring-1 ring-emerald-200 text-sm flex items-baseline gap-3 flex-wrap">
          <span className="mono text-[10px] tracking-[0.18em] uppercase text-emerald-700">Best so far</span>
          <span className="text-ink font-medium mono number-tabular">{fmtUSD(bestOtd)} out-the-door</span>
          {bestOffer.dealer && <span className="text-stone-600 text-xs">at {bestOffer.dealer}{bestOffer.city ? ` · ${bestOffer.city}` : ''}</span>}
        </div>
      )}

      {offers.length === 0 ? (
        <div className="text-center py-10 px-6 text-stone-500 border-2 border-dashed border-stone-200 rounded-xl">
          <p className="mb-2 text-stone-700">No dealer offers yet.</p>
          <p className="text-xs">Add a row when you call your first dealer. Saved in this browser — won't sync across devices.</p>
        </div>
      ) : (
        <div className="rounded-xl ring-soft mb-4 overflow-hidden">
          <div className="sm:hidden px-4 pt-2 pb-1 text-xs text-stone-500 bg-stone-50/40 flex items-center gap-2">
            <span aria-hidden>←</span><span>Swipe to see all columns</span><span aria-hidden>→</span>
          </div>
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="bg-stone-50/60 text-stone-500">
                <tr className="text-left">
                  <th className="px-3 py-3 mono text-[10px] tracking-[0.15em] uppercase font-medium">Dealer</th>
                  <th className="px-3 py-3 mono text-[10px] tracking-[0.15em] uppercase font-medium">Stock</th>
                  <th className="px-3 py-3 mono text-[10px] tracking-[0.15em] uppercase font-medium">OTD price</th>
                  <th className="px-3 py-3 mono text-[10px] tracking-[0.15em] uppercase font-medium">Days on lot</th>
                  <th className="px-3 py-3 mono text-[10px] tracking-[0.15em] uppercase font-medium">Next step</th>
                  <th className="px-3 py-3 mono text-[10px] tracking-[0.15em] uppercase font-medium">Notes</th>
                  <th className="px-2 py-3"></th>
                </tr>
              </thead>
              <tbody>
                {offers.map((o) => {
                  const isBest = parseFloat(o.otd) === bestOtd && bestOtd > 0;
                  return (
                    <tr key={o.id} className={`border-t border-stone-100 align-top ${isBest ? 'bg-emerald-50/40' : ''}`}>
                      <td className="px-3 py-3 min-w-[140px]">
                        <input type="text" placeholder="Dealer name" value={o.dealer}
                          onChange={(e) => updateOffer(o.id, { dealer: e.target.value })}
                          className={`${cellInput} text-sm text-ink`} />
                        <input type="text" placeholder="City" value={o.city}
                          onChange={(e) => updateOffer(o.id, { city: e.target.value })}
                          className="block w-full bg-transparent border-0 text-xs text-stone-500 focus:outline-none mt-1 p-0" />
                      </td>
                      <td className="px-3 py-3 min-w-[90px]">
                        <input type="text" placeholder="—" value={o.stock}
                          onChange={(e) => updateOffer(o.id, { stock: e.target.value })}
                          className={`${cellInput} mono text-xs`} />
                      </td>
                      <td className="px-3 py-3 min-w-[110px]">
                        <input type="number" placeholder="0" value={o.otd}
                          onChange={(e) => updateOffer(o.id, { otd: e.target.value })}
                          className={`${cellInput} mono text-sm number-tabular ${isBest ? 'text-emerald-700 font-medium' : 'text-ink'}`} />
                      </td>
                      <td className="px-3 py-3 min-w-[80px]">
                        <input type="text" placeholder="—" value={o.daysOnLot}
                          onChange={(e) => updateOffer(o.id, { daysOnLot: e.target.value })}
                          className={`${cellInput} mono text-sm`} />
                      </td>
                      <td className="px-3 py-3 min-w-[140px]">
                        <input type="text" placeholder="Follow up…" value={o.nextStep}
                          onChange={(e) => updateOffer(o.id, { nextStep: e.target.value })}
                          className={`${cellInput} text-sm`} />
                      </td>
                      <td className="px-3 py-3 min-w-[160px]">
                        <input type="text" placeholder="" value={o.notes}
                          onChange={(e) => updateOffer(o.id, { notes: e.target.value })}
                          className={`${cellInput} text-sm text-stone-700`} />
                      </td>
                      <td className="px-2 py-3 text-right whitespace-nowrap">
                        <button onClick={() => deleteOffer(o.id)}
                          className="text-stone-300 hover:text-rose-600 text-xl leading-none px-2 py-0.5 transition"
                          title="Delete row" aria-label="Delete row">×</button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      <div className="flex items-center justify-between gap-3 flex-wrap">
        <button onClick={addOffer}
          className="px-4 py-2 rounded-lg bg-ink text-paper text-sm font-medium hover:bg-stone-800 transition">
          + Add dealer
        </button>
        {offers.length > 0 && (
          <button onClick={() => { if (confirm('Clear all dealer offers?')) setOffers([]); }}
            className="text-xs text-stone-500 hover:text-rose-600 transition">
            Clear all
          </button>
        )}
      </div>

      <p className="text-xs text-stone-500 mt-4 leading-relaxed">
        <span className="text-ink font-medium">OTD price</span> = out-the-door, including tax, title,
        registration, and all dealer fees. Don't compare anything else. Saved to this browser's
        local storage.
      </p>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// NEGOTIATION CHECKLIST (collapsible)
// ─────────────────────────────────────────────────────────────────────────────

function NegotiationChecklist() {
  return (
    <div className="space-y-6 text-sm text-stone-700 leading-relaxed">
      <div>
        <div className="mono text-[10px] tracking-[0.18em] uppercase text-stone-500 mb-2">Before the call</div>
        <ul className="space-y-1.5">
          <li className="flex gap-2"><span className="text-stone-400">·</span><span>Find the stock # from the online listing (VW.com, Cars.com, Autotrader)</span></li>
          <li className="flex gap-2"><span className="text-stone-400">·</span><span>Note the online asking price for reference</span></li>
          <li className="flex gap-2"><span className="text-stone-400">·</span><span>Decide in advance: cash, finance through dealer, or lease — affects negotiation</span></li>
        </ul>
      </div>

      <div className="border-t border-stone-100 pt-5">
        <div className="mono text-[10px] tracking-[0.18em] uppercase text-stone-500 mb-2">On the call (in this order)</div>
        <ol className="space-y-2.5 list-decimal pl-5 marker:text-stone-400 marker:font-medium">
          <li><span className="text-ink font-medium">Ask for the out-the-door (OTD) price</span> — not the monthly. OTD includes tax, title, registration, and all dealer fees. Anything else is a smokescreen.</li>
          <li><span className="text-ink font-medium">Ask how long it's been on the lot.</span> 60+ days = motivated dealer. 90+ = very motivated.</li>
          <li><span className="text-ink font-medium">Ask if it's a demo, loaner, or aged-inventory unit.</span> These get deeper discounts and often have minimal extra miles.</li>
          <li><span className="text-ink font-medium">Ask what current manufacturer incentives apply.</span> Loyalty, conquest, military, EV — they don't volunteer these.</li>
          <li><span className="text-ink font-medium">If leasing the ID Buzz:</span> confirm in writing that the $7,500 federal commercial EV credit is built into the cap cost reduction.</li>
          <li><span className="text-ink font-medium">Refuse all "protection" add-ons</span> — paint sealant, fabric protection, nitrogen tires, VIN etching, extended warranty bundles, dealer doc fees above ~$200. Pure margin, no value.</li>
          <li><span className="text-ink font-medium">Get the quote in writing (PDF).</span> A texted screenshot also works.</li>
          <li><span className="text-ink font-medium">After 2–3 written quotes, call the lowest dealer</span> and ask plainly: "Can you beat this?" Show them the next-lowest if needed.</li>
        </ol>
      </div>

      <div className="border-t border-stone-100 pt-5">
        <div className="mono text-[10px] tracking-[0.18em] uppercase text-stone-500 mb-2">Cast a wide net</div>
        <p>Texas EV inventory varies a lot by metro. Worth calling dealers in <span className="text-ink">Austin, Houston, San Antonio, Dallas, Phoenix</span>. Out-of-state purchase is straightforward — VW will arrange transport, or fly + drive home (often cheaper than the in-state markup).</p>
      </div>

      <div className="border-t border-stone-100 pt-5">
        <div className="mono text-[10px] tracking-[0.18em] uppercase text-amber-700 mb-2">Walk-away signals</div>
        <ul className="space-y-1.5 text-stone-600">
          <li className="flex gap-2"><span className="text-amber-600">✕</span><span>Won't quote OTD over the phone</span></li>
          <li className="flex gap-2"><span className="text-amber-600">✕</span><span>"You really need to come in to see the numbers"</span></li>
          <li className="flex gap-2"><span className="text-amber-600">✕</span><span>Adds unexpected fees after you've agreed on a price</span></li>
          <li className="flex gap-2"><span className="text-amber-600">✕</span><span>"This price is only good today"</span></li>
          <li className="flex gap-2"><span className="text-amber-600">✕</span><span>Refuses to itemize the OTD breakdown</span></li>
        </ul>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// APP
// ─────────────────────────────────────────────────────────────────────────────

function App() {
  const [globals, setGlobals] = useState(DEFAULT_GLOBALS);
  const [vehicles, setVehicles] = useState(DEFAULT_VEHICLES);

  const winnerId = useMemo(() => {
    let best = vehicles[0], bestVal = trueCostAtMonth(best, globals, 60);
    vehicles.forEach((v) => {
      const t = trueCostAtMonth(v, globals, 60);
      if (t < bestVal) { best = v; bestVal = t; }
    });
    return best.id;
  }, [vehicles, globals]);

  const monthlyWinnerId = useMemo(() => {
    let best = vehicles[0], bestVal = computeMonthly(best, globals).total;
    vehicles.forEach((v) => {
      const m = computeMonthly(v, globals).total;
      if (m < bestVal) { best = v; bestVal = m; }
    });
    return best.id;
  }, [vehicles, globals]);

  const winner = vehicles.find((v) => v.id === winnerId);

  return (
    <div className="min-h-screen pb-20">
      <Header />
      <Hero winner={winner} globals={globals} />
      <ComparisonTable vehicles={vehicles} globals={globals} setVehicles={setVehicles}
                       winnerId={winnerId} monthlyWinnerId={monthlyWinnerId} />
      <CumulativeChart vehicles={vehicles} globals={globals} />
      <InputsPanel globals={globals} setGlobals={setGlobals} />

      <Section className="space-y-4">
        <Collapsible eyebrow="ID Buzz · adjusted economics" title="The five-year number, minus the tax angles" defaultOpen
                     summary="What the headline ID Buzz cost drops to once Section 179, the wrap deduction, and the federal EV credit are stacked in.">
          <BuzzAdjustedEconomics vehicles={vehicles} globals={globals} />
        </Collapsible>

        <Collapsible eyebrow="ID Buzz · the business angle" title="Why a quirky van might out-perform on after-tax math"
                     summary="Section 179, the lease-based federal EV credit, and the wrap as a marketing expense. Where the Buzz wins (and where it doesn't).">
          <BuzzBusinessCase />
        </Collapsible>

        <Collapsible eyebrow="Sol Solace wrap · concepts" title="What a wrapped Buzz could look like" defaultOpen
                     summary="Two AI-generated palette directions on the ID Buzz silhouette.">
          <WrapMockups />
        </Collapsible>

        <Collapsible eyebrow="Mobile treatment trailer" title="Replacing $50k/yr of office rent with a $20–25k asset" defaultOpen
                     summary="A trailer built out as a mobile treatment room — possibly the largest single leverage move in this whole analysis.">
          <MobileTrailerAnalysis />
        </Collapsible>

        <Collapsible eyebrow="ID Buzz · pick a trim" title="Pro S vs. Pro S Plus vs. 1st Edition"
                     summary="What's actually different between the three US trims and which fits a high-mileage family van that might get wrapped.">
          <BuzzTrimPicker />
        </Collapsible>

        <Collapsible eyebrow="Dealer offer tracker" title="One row per dealer you call"
                     summary="Stores OTD prices and notes in your browser. Highlights the lowest offer automatically.">
          <DealerTracker />
        </Collapsible>

        <Collapsible eyebrow="Calling dealers" title="Negotiation checklist"
                     summary="What to ask, in what order. Plus the signs to walk away.">
          <NegotiationChecklist />
        </Collapsible>

        <Collapsible eyebrow="Optional side income" title="Turo, applied to each vehicle"
                     summary="Renting the car part-time when you're out of town or when one car covers both adults.">
          <TuroBlock vehicles={vehicles} globals={globals} />
        </Collapsible>

        <Collapsible eyebrow="Used Tesla risk" title="Battery warranty runway"
                     summary="Why $10k of sticker discount on the used Y might not be $10k of value.">
          <WarrantyBlock vehicles={vehicles} globals={globals} />
        </Collapsible>

        <Collapsible eyebrow="Plain version" title="One-page summary"
                     summary="Printable, copy-pasteable. The numbers, the assumptions, and what to verify.">
          <SummaryBlock vehicles={vehicles} globals={globals} winnerId={winnerId} />
        </Collapsible>

        <Collapsible eyebrow="Methodology" title="What this includes (and doesn't)"
                     summary="Where the defaults come from and what the model leaves out.">
          <NotesBlock />
        </Collapsible>
      </Section>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
