// ─────────────────────────────────────────────────────────────────────────────
// FINANCIAL ENGINE
// ─────────────────────────────────────────────────────────────────────────────

function monthlyLoanPayment(price, downPayment, aprPercent, months) {
  const principal = Math.max(0, price - downPayment);
  if (principal === 0 || months <= 0) return 0;
  const r = aprPercent / 100 / 12;
  if (r === 0) return principal / months;
  return (principal * r) / (1 - Math.pow(1 + r, -months));
}

function totalInterest(price, downPayment, aprPercent, months) {
  const payment = monthlyLoanPayment(price, downPayment, aprPercent, months);
  const principal = Math.max(0, price - downPayment);
  return Math.max(0, payment * months - principal);
}

function fuelMonthly(vehicle, monthlyMiles, gasPrice, electricityRate) {
  if (vehicle.type === 'EV') {
    return (monthlyMiles / vehicle.milesPerKwh) * electricityRate;
  }
  return (monthlyMiles / vehicle.mpg) * gasPrice;
}

function effectiveDownPayment(vehicle, globalDownPayment) {
  if (vehicle.fixedDownPayment !== undefined) return vehicle.fixedDownPayment;
  // Can't put more down than the car costs
  return Math.min(globalDownPayment, vehicle.price);
}

function computeMonthly(vehicle, g) {
  const down = effectiveDownPayment(vehicle, g.downPayment);
  const payment = monthlyLoanPayment(vehicle.price, down, vehicle.apr, vehicle.loanMonths);
  const fuel = fuelMonthly(vehicle, g.monthlyMiles, g.gasPrice, g.electricityRate);
  const insurance = vehicle.insurance;
  const maintenance = vehicle.maintenance;
  return {
    payment,
    fuel,
    insurance,
    maintenance,
    total: payment + fuel + insurance + maintenance,
    downPayment: down,
  };
}

function cumulativeSeries(vehicle, g, horizonMonths = 60) {
  const m = computeMonthly(vehicle, g);
  const series = [];
  let cum = m.downPayment;
  series.push({ month: 0, total: cum });
  for (let i = 1; i <= horizonMonths; i++) {
    const monthPayment = i <= vehicle.loanMonths ? m.payment : 0;
    cum += monthPayment + m.fuel + m.insurance + m.maintenance;
    series.push({ month: i, total: cum });
  }
  return series;
}

function totalAtMonth(vehicle, g, atMonth) {
  const m = computeMonthly(vehicle, g);
  const paymentMonths = Math.min(atMonth, vehicle.loanMonths);
  return m.downPayment + paymentMonths * m.payment + atMonth * (m.fuel + m.insurance + m.maintenance);
}

const fmtUSD = (n, digits = 0) =>
  new Intl.NumberFormat('en-US', {
    style: 'currency',
    currency: 'USD',
    maximumFractionDigits: digits,
    minimumFractionDigits: digits,
  }).format(Math.round(n * Math.pow(10, digits)) / Math.pow(10, digits));

const fmtUSDcompact = (n) => {
  if (Math.abs(n) >= 1000) return '$' + (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
  return fmtUSD(n);
};

const ACCENT = {
  emerald: { text: 'text-emerald-700', bg: 'bg-emerald-50', ring: 'ring-emerald-200', dot: 'bg-emerald-600', stroke: '#047857' },

  amber:   { text: 'text-amber-700',   bg: 'bg-amber-50',   ring: 'ring-amber-200',   dot: 'bg-amber-600',   stroke: '#b45309' },
  stone:   { text: 'text-stone-700',   bg: 'bg-stone-100',  ring: 'ring-stone-300',   dot: 'bg-stone-600',   stroke: '#57534e' },

function CumulativeChart({ vehicles, globals }) {
  const horizon = 60;
  const data = useMemo(() => {
    const series = vehicles.map((v) => ({ v, s: cumulativeSeries(v, globals, horizon) }));
    const rows = [];
    for (let i = 0; i <= horizon; i++) {
      const row = { month: i };
      series.forEach(({ v, s }) => { row[v.id] = Math.round(s[i].total); });
      rows.push(row);
    }
    return rows;
  }, [vehicles, globals]);

  // find break-even between Subaru and the new Model Y regular
  const breakEven = useMemo(() => {
    const a = vehicles.find((v) => v.id === 'subaru-used');
    const b = vehicles.find((v) => v.id === 'tesla-new-regular');
    if (!a || !b) return null;
    for (let i = 0; i <= horizon; i++) {
      const at = totalAtMonth(a, globals, i);
      const bt = totalAtMonth(b, globals, i);
      if (bt < at && i > 0) return i;
    }
    return null;
  }, [vehicles, globals]);

  return (
    <div className="rounded-2xl bg-white ring-soft p-6 sm:p-8">
      <div className="flex items-baseline justify-between gap-4 flex-wrap mb-2">
        <div>
          <h3 className="display text-2xl font-medium">Cumulative cash out · 5 years</h3>
          <p className="text-sm text-stone-500 mt-1">Every dollar you'll have spent on the car, by month. Lower line wins.</p>
        </div>
        {breakEven && (
          <Pill accent="emerald">Model Y passes Subaru at month {breakEven}</Pill>
        )}
      </div>
      <div className="h-80 sm:h-96 mt-4">
        <ResponsiveContainer>
          <LineChart data={data} margin={{ top: 10, right: 24, left: 0, bottom: 0 }}>
            <CartesianGrid stroke="#E7E2D6" strokeDasharray="2 4" vertical={false} />
            <XAxis
              dataKey="month"
              tick={{ fill: '#78716c', fontSize: 11 }}
              tickLine={false}
              axisLine={{ stroke: '#E7E2D6' }}
              ticks={[0, 12, 24, 36, 48, 60]}
              tickFormatter={(m) => m === 0 ? 'now' : `yr ${m/12}`}
            />
            <YAxis
              tick={{ fill: '#78716c', fontSize: 11 }}
              tickLine={false}
              axisLine={{ stroke: '#E7E2D6' }}
              tickFormatter={(v) => fmtUSDcompact(v)}

            />
            <Tooltip
              contentStyle={{ background: '#FBF8F3', border: '1px solid #E7E2D6', borderRadius: 8, fontSize: 12 }}

function FuelSavingsChart({ globals, vehicles }) {
  const data = useMemo(() => {
    const ev = vehicles.find((v) => v.type === 'EV');

    if (!ev || !gas) return [];
    const milesRange = [10000, 15000, 20000, 25000, 30000, 35000, 40000];
    return milesRange.map((annual) => {
      const monthly = annual / 12;
      const gasCost = (monthly / gas.mpg) * globals.gasPrice * 12;
      const elecCost = (monthly / ev.milesPerKwh) * globals.electricityRate * 12;
      return {
        miles: annual,
        Gasoline: Math.round(gasCost),
        Electricity: Math.round(elecCost),
        Savings: Math.round(gasCost - elecCost),

function WarrantyRunway({ vehicles, globals }) {
  const used = vehicles.find((v) => v.id === 'tesla-used');
  if (!used) return null;
  const remaining = used.batteryWarrantyMiles - used.startingMiles;
  const yearsRemaining = remaining / globals.annualMiles;
  const months = Math.min(96, Math.ceil(yearsRemaining * 12));
  const data = [];
  for (let m = 0; m <= 96; m++) {
    const miles = used.startingMiles + (globals.annualMiles / 12) * m;
    data.push({
      month: m,
      miles: Math.round(miles),
      warranty: used.batteryWarrantyMiles,
      out: miles > used.batteryWarrantyMiles ? Math.round(miles) : null,
    });

  return (
    <div className="rounded-2xl bg-amber-50/60 ring-1 ring-amber-200 p-6 sm:p-8">

      <p className="text-sm text-stone-600 mt-2 max-w-2xl leading-relaxed">

        warranty is 8 years or 100,000 miles, whichever comes first. At {globals.annualMiles.toLocaleString()} miles a year,
        you'd cross the 100k mark in about <span className="font-medium text-ink">{yearsRemaining.toFixed(1)} years</span>.
      </p>
      <div className="h-56 sm:h-64 mt-6">
        <ResponsiveContainer>
          <AreaChart data={data}>
            <CartesianGrid stroke="#FCE7B7" strokeDasharray="2 4" vertical={false} />
            <XAxis dataKey="month" tickFormatter={(m) => m === 0 ? 'now' : `yr ${(m/12).toFixed(0)}`} ticks={[0,12,24,36,48,60,72,84,96]} tick={{ fill: '#92400e', fontSize: 11 }} tickLine={false} axisLine={{ stroke: '#FCE7B7' }} />

        dollar value.

  );

function turoNetMonthly(vehicle, daysPerMonth, reservePerDay) {
  if (!vehicle.turoDaily) return 0;
  return Math.max(0, (vehicle.turoDaily - reservePerDay) * daysPerMonth);
}

function TuroSection({ globals, vehicles }) {
  // Default: ~half-time availability. ~12 rental days/month ≈ Turo's "Avg earnings" quote.
  const [daysPerMonth, setDaysPerMonth] = useState(12);
  const [reservePerDay, setReservePerDay] = useState(25);
  const [robotaxiMonthly, setRobotaxiMonthly] = useState(0);
  const [robotaxiEnabled, setRobotaxiEnabled] = useState(false);

  const rows = vehicles.map((v) => {
    const m = computeMonthly(v, globals);
    const turoGross = (v.turoDaily || 0) * daysPerMonth;
    const turoReserve = daysPerMonth * reservePerDay;
    const turoNet = Math.max(0, turoGross - turoReserve);
    const annualNet = turoNet * 12;
    const annualLoan = m.payment * Math.min(12, v.loanMonths);
    const roi = annualLoan > 0 ? (annualNet / annualLoan) * 100 : null;
    const monthlyAfter = m.total - turoNet - (robotaxiEnabled ? robotaxiMonthly : 0);
    return {
      v, m, turoGross, turoReserve, turoNet, annualNet, annualLoan, roi, monthlyAfter,
    };
  });

  const minAfter = Math.min(...rows.map((r) => r.monthlyAfter));

  return (
    <Section id="upside" eyebrow="Optional side income" title="Turo income, applied to each vehicle."
      subtitle="The defaults below come from Turo's calculator for each vehicle, set to roughly half-time availability — the realistic case when the car is rented while you're out of town or when you don't need both cars. Toggle robotaxi separately as a speculative line.">

      <div className="rounded-2xl bg-white ring-soft p-6 sm:p-8 mb-6">
        <p className="text-sm text-stone-600 leading-relaxed">
          <span className="text-ink font-medium">Note on availability.</span>{' '}
          A car already driving 30,000 personal miles a year has limited extra capacity for rentals.
          At 12 rental days a month, you're adding roughly 6,000–10,000 Turo miles a year on top
          of personal use. Watch your maintenance line — at very high total annual mileage, tire and
          brake costs accelerate.
        </p>
      </div>

      <div className="grid lg:grid-cols-2 gap-6 mb-8">
        <div className="rounded-2xl bg-white ring-soft p-6 sm:p-7">
          <h4 className="display text-xl font-medium mb-1">Turo settings</h4>
          <p className="text-xs text-stone-500 mb-5">Applies to all vehicles. Per-vehicle daily rates live in the Assumptions section.</p>
          <div className="space-y-5">
            <Slider label="Rental days per month" value={daysPerMonth} onChange={setDaysPerMonth} min={0} max={24} step={1} format={(v) => v + ' days'} hint="12 days ≈ half-time. Turo's quoted average earnings assume ~12–15 days/mo." />
            <Slider label="Reserve per rental day" value={reservePerDay} onChange={setReservePerDay} min={0} max={75} step={5} format={(v) => '$' + v + '/day'} hint="Cleaning, fuel/charge top-up, claim deductible buffer. ~$20–30/day is realistic." />
          </div>
        </div>

        <div className="rounded-2xl bg-white ring-soft p-6 sm:p-7">
          <div className="flex items-center justify-between mb-1">
            <h4 className="display text-xl font-medium">Robotaxi (speculative)</h4>
            <Toggle on={robotaxiEnabled} onChange={setRobotaxiEnabled} />
          </div>
          <p className="text-xs text-stone-500 mb-5">No regulatory framework yet for owner-operator robotaxi income at scale. Treat as scenario, not forecast.</p>
          <div className={`space-y-5 transition-opacity ${robotaxiEnabled ? '' : 'opacity-40 pointer-events-none'}`}>
            <Slider label="Hypothetical net monthly income" value={robotaxiMonthly} onChange={setRobotaxiMonthly} min={0} max={1500} step={50} format={(v) => '$' + v + '/mo'} />
          </div>
        </div>
      </div>

      <div className="rounded-2xl bg-white ring-soft overflow-hidden">
        <div className="px-6 sm:px-8 py-5 border-b border-stone-100">
          <h4 className="display text-xl font-medium">Per-vehicle comparison · with Turo applied</h4>
          <p className="text-xs text-stone-500 mt-1">Net monthly cost = vehicle all-in − Turo net{robotaxiEnabled ? ' − robotaxi income' : ''}.</p>
        </div>
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead className="bg-stone-50/60 text-stone-500">
              <tr className="text-left">
                <th className="px-4 sm:px-6 py-3 font-medium">Vehicle</th>
                <th className="px-3 py-3 font-medium mono text-[11px] tracking-wider uppercase">Daily rate</th>
                <th className="px-3 py-3 font-medium mono text-[11px] tracking-wider uppercase">Turo net /mo</th>
                <th className="px-3 py-3 font-medium mono text-[11px] tracking-wider uppercase">Turo net /yr</th>
                <th className="px-3 py-3 font-medium mono text-[11px] tracking-wider uppercase">Annual loan</th>
                <th className="px-3 py-3 font-medium mono text-[11px] tracking-wider uppercase">Coverage</th>
                <th className="px-4 sm:px-6 py-3 font-medium mono text-[11px] tracking-wider uppercase text-right">Net /mo</th>
              </tr>
            </thead>
            <tbody>
              {rows.map((r) => {
                const a = ACCENT[r.v.accent];
                const isMin = r.monthlyAfter === minAfter;
                return (
                  <tr key={r.v.id} className={`border-t border-stone-100 ${isMin ? a.bg : ''}`}>
                    <td className="px-4 sm:px-6 py-3.5">
                      <div className="flex items-center gap-2">
                        <span className={`w-1.5 h-1.5 rounded-full ${a.dot}`} />
                        <span className="text-ink font-medium">{r.v.short}</span>
                      </div>
                      <div className="text-xs text-stone-500 mt-0.5">{r.v.tagline}</div>
                    </td>
                    <td className="px-3 py-3.5 mono number-tabular text-stone-700">{fmtUSD(r.v.turoDaily || 0)}</td>
                    <td className="px-3 py-3.5 mono number-tabular text-emerald-700">{fmtUSD(r.turoNet)}</td>
                    <td className="px-3 py-3.5 mono number-tabular text-stone-700">{fmtUSD(r.annualNet)}</td>
                    <td className="px-3 py-3.5 mono number-tabular text-stone-700">{fmtUSD(r.annualLoan)}</td>
                    <td className="px-3 py-3.5 mono number-tabular text-stone-700">{r.roi !== null ? r.roi.toFixed(0) + '%' : '—'}</td>
                    <td className={`px-4 sm:px-6 py-3.5 mono number-tabular text-right ${isMin ? a.text + ' font-medium' : 'text-ink'}`}>{fmtUSD(r.monthlyAfter)}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        <div className="px-6 sm:px-8 py-4 text-xs text-stone-500 border-t border-stone-100 leading-relaxed">
          <span className="text-ink font-medium">Coverage</span> = Turo earnings ÷ annual loan payments. Above 100% means Turo more than pays the loan. The Subaru's lower loan cost shows up here — but the Tesla's lower fuel cost dominates the overall monthly figure on the right.
        </div>
      </div>
    </Section>
  );
}

function Toggle({ on, onChange }) {
  return (
    <button
      onClick={() => onChange(!on)}
      className={`relative w-10 h-6 rounded-full transition-colors ${on ? 'bg-emerald-600' : 'bg-stone-300'}`}
      aria-pressed={on}
    >
      <span className={`absolute top-0.5 left-0.5 w-5 h-5 rounded-full bg-white shadow transition-transform ${on ? 'translate-x-4' : ''}`} />
    </button>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// SUMMARY NOTE
// ─────────────────────────────────────────────────────────────────────────────

function SummaryNote({ vehicles, globals, winnerId, currentMonthly }) {
  const [copied, setCopied] = useState(false);
  const winner = vehicles.find((v) => v.id === winnerId);
  const subaru = vehicles.find((v) => v.id === 'subaru-used');
  const wm = winner ? computeMonthly(winner, globals) : null;
  const sm = subaru ? computeMonthly(subaru, globals) : null;

  const text = useMemo(() => {
    if (!winner || !wm) return '';
    const lines = [];
    lines.push('Vehicle decision · the numbers');
    lines.push('');
    lines.push(`Annual driving: ${globals.annualMiles.toLocaleString()} miles (roughly 2× the US average).`);
    lines.push(`Current spend: ${fmtUSD(globals.currentGasSpend)}/mo gasoline + ${fmtUSD(globals.currentMaintenanceSpend)}/mo maintenance ≈ ${fmtUSD((globals.currentGasSpend + globals.currentMaintenanceSpend) * 12)}/yr.`);
    lines.push('');
    lines.push('All-in monthly cost (payment + fuel/electricity + insurance + maintenance):');
    vehicles.forEach((v) => {
      const m = computeMonthly(v, globals);
      lines.push(`  • ${v.name}: ${fmtUSD(m.total)}/mo`);
    });
    lines.push('');
    lines.push('Five-year total cash out (includes down payment):');
    vehicles.forEach((v) => {
      const t = totalAtMonth(v, globals, 60);
      lines.push(`  • ${v.name}: ${fmtUSD(t)}`);
    });
    lines.push('');
    lines.push(`Lowest five-year total: ${winner.name}.`);
    lines.push('');
    if (winner.type === 'EV' && subaru) {
      const fuelDelta = sm.fuel - wm.fuel;
      lines.push(`Fuel cost detail: at ${globals.annualMiles.toLocaleString()} mi/yr, gasoline costs ~${fmtUSD(sm.fuel)}/mo vs. ~${fmtUSD(wm.fuel)}/mo on electricity. Difference: ${fmtUSD(fuelDelta)}/mo, or ${fmtUSD(fuelDelta * 12)}/yr.`);
      lines.push('');
    }
    lines.push('Not included in the headline numbers above: Turo income, robotaxi income, federal EV tax credit (up to $7,500), sales tax, dealer fees, resale value, depreciation. Turo income is shown separately in the comparison.');
    lines.push('');
    lines.push('Items to verify before signing:');
    lines.push('  • Real insurance quotes per vehicle (can swing the result $50–100/mo)');
    lines.push('  • Home charging access and actual electricity rate');
    lines.push('  • Test drive — comfort matters at 3 hours/day');
    return lines.join('\n');
  }, [vehicles, globals, winnerId, currentMonthly, winner, wm, sm, subaru]);

  const copy = async () => {
    try {
      await navigator.clipboard.writeText(text);
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    } catch (e) {
      // ignore
    }
  };

  return (
    <Section id="summary" eyebrow="Plain summary" title="The whole picture, in one page."
      subtitle="A printable, copy-pasteable version of the analysis. No persuasion — just the numbers and the assumptions behind them.">
      <div className="rounded-2xl bg-white ring-soft p-6 sm:p-10">
        <div className="flex items-center justify-between mb-6 no-print">
          <div className="text-xs mono uppercase tracking-[0.18em] text-stone-500">Shareable note</div>
          <div className="flex gap-2">
            <button onClick={copy} className="px-3 py-1.5 rounded-lg text-xs font-medium bg-ink text-paper hover:bg-stone-800 transition">
              {copied ? '✓ Copied' : 'Copy text'}
            </button>
            <button onClick={() => window.print()} className="px-3 py-1.5 rounded-lg text-xs font-medium ring-1 ring-stone-300 text-stone-700 hover:bg-stone-50 transition">
              Print
            </button>
          </div>
        </div>
        <pre className="whitespace-pre-wrap text-[15px] leading-[1.7] text-stone-800 font-sans" style={{ fontFamily: 'Fraunces, Georgia, serif' }}>
{text}
        </pre>
      </div>
    </Section>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// FOOTER / DISCLAIMERS
// ─────────────────────────────────────────────────────────────────────────────

function Disclaimers() {
  return (
    <Section className="py-16">
      <div className="border-t border-stone-200 pt-10">
        <div className="grid sm:grid-cols-2 gap-8 text-sm text-stone-600 leading-relaxed">
          <div>
            <div className="mono text-[10px] tracking-[0.18em] uppercase text-stone-500 mb-2">What this is</div>
            A model for thinking, not a forecast. Defaults come from public Tesla pricing,
            US average electricity & gas, and reasonable maintenance averages. Your real numbers
            will differ — adjust the inputs to match your situation.
          </div>
          <div>
            <div className="mono text-[10px] tracking-[0.18em] uppercase text-stone-500 mb-2">What it doesn't account for</div>
            Sales tax & dealer fees, resale value, tax credits (federal EV credit can be $7,500),
            home charger install cost, depreciation curves, and the real-world variance in insurance
            quotes. Get an actual quote before signing anything.
          </div>
          <div>
            <div className="mono text-[10px] tracking-[0.18em] uppercase text-stone-500 mb-2">Speculative items</div>
            Turo income depends on demand, location, vehicle availability, and your tolerance for
            strangers in your car. Robotaxi revenue is not currently available to individual Tesla
            owners and may never be at the scale advertised.
          </div>
          <div>
            <div className="mono text-[10px] tracking-[0.18em] uppercase text-stone-500 mb-2">Battery & warranty</div>
            Tesla's battery & drivetrain warranty: 8 years or 100,000 miles, minimum 70% retention.
            At 30k miles/yr, used Teslas with 40k+ miles burn through warranty fast. New starts the
            clock fresh.
          </div>
        </div>
        <div className="mt-10 text-xs text-stone-400">
          This is a personal decision tool, not financial advice. The author has no affiliation with Tesla, Subaru, Turo, or any financing institution.
        </div>
      </div>
    </Section>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// APP
// ─────────────────────────────────────────────────────────────────────────────

function App() {
  const [globals, setGlobals] = useState(DEFAULT_GLOBALS);
  const [vehicles, setVehicles] = useState(DEFAULT_VEHICLES);

  const winnerId = useMemo(() => {
    // Score on 5-year total
    let best = vehicles[0];
    let bestTotal = totalAtMonth(best, globals, 60);
    vehicles.forEach((v) => {
      const t = totalAtMonth(v, globals, 60);
      if (t < bestTotal) { best = v; bestTotal = t; }
    });
    return best.id;
  }, [vehicles, globals]);

  const runnerId = useMemo(() => {
    const sorted = [...vehicles].sort((a, b) => totalAtMonth(a, globals, 60) - totalAtMonth(b, globals, 60));
    return sorted[1]?.id;
  }, [vehicles, globals]);

  const currentMonthly = globals.currentGasSpend + globals.currentMaintenanceSpend;

  return (
    <div className="min-h-screen">
      <Header />
      <Hero />
      <Verdict vehicles={vehicles} globals={globals} winnerId={winnerId} runnerId={runnerId} currentMonthly={currentMonthly} />
      <SituationStrip globals={globals} />
      <VehicleCards vehicles={vehicles} globals={globals} winnerId={winnerId} />
      <div className="h-16" />
      <Section id="charts" eyebrow="The numbers, visually" title="Three charts, three questions."
        subtitle="One: how does total cash out grow over 5 years? Two: where does each dollar go each month? Three: why does mileage matter so much?">
        <div className="space-y-6">
          <CumulativeChart vehicles={vehicles} globals={globals} />
          <div className="grid lg:grid-cols-2 gap-6">
            <MonthlyBreakdownChart vehicles={vehicles} globals={globals} />
            <FuelSavingsChart vehicles={vehicles} globals={globals} />
          </div>
        </div>
      </Section>
      <div className="h-16" />
      <Section eyebrow="The used Tesla question" title="Why $10k of savings might not be $10k of savings.">
        <WarrantyRunway vehicles={vehicles} globals={globals} />
      </Section>
      <div className="h-16" />
      <AssumptionsPanel globals={globals} setGlobals={setGlobals} vehicles={vehicles} setVehicles={setVehicles} />
      <div className="h-16" />
      <TuroSection globals={globals} vehicles={vehicles} winnerId={winnerId} />
      <div className="h-16" />
      <SummaryNote vehicles={vehicles} globals={globals} winnerId={winnerId} currentMonthly={currentMonthly} />
      <Disclaimers />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
